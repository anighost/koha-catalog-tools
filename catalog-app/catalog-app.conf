# Apache virtual host for catalog.disharifoundation.org
# Place at: /etc/apache2/sites-available/catalog-app.conf
# Enable with: sudo a2ensite catalog-app && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName catalog.disharifoundation.org

    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:5050/
    ProxyPassReverse / http://127.0.0.1:5050/

    # Upload size limit — 10 MB
    LimitRequestBody 10485760

    ErrorLog  /var/log/apache2/catalog-app-error.log
    CustomLog /var/log/apache2/catalog-app-access.log combined
</VirtualHost>
