{% extends "base.html" %}
{% block title %}Login — Dishari Catalog{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-sm-6 col-md-4">
    <div class="dfl-card p-4">
      <div class="section-title mb-3">Catalog Access</div>
      <p class="text-muted small mb-4">
        Sign in to upload and process Gronthee catalog files.
      </p>
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label fw-semibold" style="font-size:0.83rem">Password</label>
          <input type="password" name="password" class="form-control" autofocus required
                 style="border-radius:8px;border-color:var(--border);font-size:0.88rem">
        </div>
        <button type="submit" class="btn btn-crimson w-100 mt-1">Sign In</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
